<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
    <!-- <script src="utils.js"></script> -->
  </head>
  <body>
    <main>
      <header>
        <p id="p_wallet" class="p_wallet">R$ 200,00</p>
        <img height="30px" src="./imgs/wallet.svg" />
      </header>

      <section class="bloco" id="bloco">
        <div id="div_aguardar" class="aguardar">
          <p>Aguarde</p>
          <div>
            <div id="bar_pink" class="bar-pink"></div>
          </div>
        </div>

        <div class="cards" id="div_cards"><!-- <div class="card card--green"> <p>1</p> </div> --></div>
      </section>

      <section id="div_historico" class="historico">
        <button class="btn btn-green">1</button>
        <button class="btn btn-blue">2</button>
        <button class="btn btn-white">3</button>
      </section>

      <section class="escolha">
        <button id="btn_escolha_1" class="btn-outline btn-outline-green btn-active">2x</button>
        <button id="btn_escolha_2" class="btn-outline btn-outline-white">14x</button>
        <button id="btn_escolha_3" class="btn-outline btn-outline-blue">2x</button>
      </section>

      <section class="hud">
        <button id="btn_half" class="btn_half">1/2</button>
        <input disabled id="inp_betvalue" class="inp_betvalue" value="R$ 200,00" />
        <button id="btn_double" class="btn_double">x2</button>
        <button id="btn_apostar" class="btn_apostar">Apostar</button>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
